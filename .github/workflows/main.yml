name: Main Branch Commit

on:
  push:
    branches: [ 'main' ]
  schedule:
    # At 6:00 am on the 1st and 15th day of the month (every two weeks)
    - cron: '0 6 1,15 * *'
  workflow_dispatch:
    inputs:
      runner_type:
        type: choice
        required: true
        description: "Runner type"
        default: "self-hosted"
        options:
          - "self-hosted"
          - "macos-15"
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
  MATCH_GIT_URL: ${{ vars.MATCH_GIT_URL }}
  MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
  FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
  DEVELOPER_PORTAL_TEAM_ID: ${{ secrets.DEVELOPER_PORTAL_TEAM_ID }}
  CONNECT_API_KEY_ID: ${{ secrets.CONNECT_API_KEY_ID }}
  CONNECT_API_ISSUER_ID: ${{ secrets.CONNECT_API_ISSUER_ID }}
  CONNECT_API_KEY_CONTENT: ${{ secrets.CONNECT_API_KEY_CONTENT }}
  BETA_APP_REVIEW_INFO: ${{ vars.BETA_APP_REVIEW_INFO }}
  CODE_SIGNING_IDENTITY: ${{ secrets.CODE_SIGNING_IDENTITY }}
  TEMP_KEYCHAIN_NAME: ${{ vars.TEMP_KEYCHAIN_NAME }}
  SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}

  CURRENT_BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  RUBY_VERSION: ${{ vars.RUBY_VERSION }}
  XCODE_VERSION: ${{ vars.XCODE_VERSION }}

jobs:
  get-version-number:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      version-number: ${{ steps.get_version.outputs.version-number }}
      build-number: ${{ steps.get_version.outputs.build-number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        uses: ./.github/actions/get-version

  build-and-distribute:
    name: Build and Distribute
    needs: [get-version-number]
    runs-on: "${{ github.event.inputs.runner_type || 'self-hosted' }}"

    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache RubyGem Dependencies
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Run Fastlane
        uses: maierj/fastlane-action@v3.1.0
        with:
          lane: 'main'
          options: |
            {
                "build_number": "${{ needs.get-version-number.outputs.build-number }}",
                "version_number": "${{ needs.get-version-number.outputs.version-number }}"
            }

  create-tag:
    name: Create Tag
    needs: [get-version-number, build-and-distribute]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Tag
        uses: ./.github/actions/create-tag
        with:
          build-category: 'release'
          app-version: ${{ needs.get-version-number.outputs.version-number }}
          build-number: ${{ needs.get-version-number.outputs.build-number }}
